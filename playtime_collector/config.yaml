name: Playtime Collector
version: "0.9.6"
slug: playtime_collector
description: Cross-platform console playtime & trophies (PS3, PS Vita) — web dashboard, settings & people UI + JSON API
url: https://github.com/vlad-bystritskii/ha-ps3-addon
stage: stable
arch:
  - amd64
  - aarch64
init: false
boot: auto
webui: "http://[HOST]:[PORT:3301]/"
ports:
  "3301/tcp": 3301
ports_description:
  "3301/tcp": Web UI & JSON API
# Minimal bootstrap config only — everything else (Vita, PSN/rarity, intervals,
# game-name overrides, ignore lists, playtime source) is configured from the
# add-on's own Web UI -> Settings & Games pages, which persist to
# /share/playtime/settings.json (survives reinstalls, no extra HA permissions).
map:
  - data:rw
  - share:rw
options:
  ps3_host: ""
  vita_host: ""
  auth_token: ""
schema:
  ps3_host: str
  vita_host: "str?"
  auth_token: str
